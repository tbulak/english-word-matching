<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Matching Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { display: flex; }
        .column { width: 50%; padding: 10px; }
        .word { cursor: pointer; }
        .line { position: absolute; height: 2px; background: black; }
    </style>
</head>
<body>
    <h1>Word Matching Game</h1>
    <p>Match the Turkish words on the left with their English equivalents on the right.</p>
    <div class="container">
        <div id="turkish" class="column">
            <h2>Turkish Words</h2>
            <!-- Turkish words will be populated here -->
        </div>
        <div id="english" class="column">
            <h2>English Words</h2>
            <!-- English words will be populated here -->
        </div>
    </div>
    <div id="success-screen" style="display:none;">
        <h2>Congratulations! You matched all words!</h2>
    </div>
    <div id="pagination">
        <button id="prev" onclick="changePage(-1)">Previous</button>
        <button id="next" onclick="changePage(1)">Next</button>
    </div>

    <script>
        let turkishWords = ["merhaba", "güle güle", "ev", "su", "yemek", "kitap", "okul", "arada", "bir", "sana"];
        let englishWords = ["hello", "goodbye", "house", "water", "food", "book", "school", "between", "one", "you"];
        let currentPage = 0;
        const wordsPerPage = 10;

        function displayWords() {
            const start = currentPage * wordsPerPage;
            const end = start + wordsPerPage;
            const turkishList = turkishWords.slice(start, end);
            const englishList = englishWords.slice(start, end);
            document.getElementById("turkish").innerHTML = turkishList.map(word => `<div class=\"word\">${word}</div>`).join('');
            document.getElementById("english").innerHTML = englishList.map(word => `<div class=\"word\">${word}</div>`).join('');
            // Add logic for checking matches
        }

        function changePage(direction) {
            currentPage += direction;
            displayWords();
        }

        displayWords();
    </script>
</body>
</html>
