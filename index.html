<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matching Game Interface</title>
    <style>
        .container { display: flex; justify-content: space-between; }
        .turkish, .english { width: 45%; }
        .connection { position: relative; }
        .line { position: absolute; border-left: 2px solid black; }
    </style>
</head>
<body>
    <h1>Matching Game</h1>
    <div class="container">
        <div class="turkish">
            <h2>Turkish Words</h2>
            <ul>
                <li>Ev</li>
                <li>Araba</li>
                <li>Kitap</li>
                <li>Okul</li>
            </ul>
        </div>
        <div class="english">
            <h2>English Words</h2>
            <ul>
                <li>House</li>
                <li>Car</li>
                <li>Book</li>
                <li>School</li>
            </ul>
        </div>
        <div class="connection">
            <div class="line" style="top: 30px; left: 45%; height: 50px;"></div>
            <div class="line" style="top: 90px; left: 45%; height: 50px;"></div>
            <div class="line" style="top: 150px; left: 45%; height: 50px;"></div>
            <div class="line" style="top: 210px; left: 45%; height: 50px;"></div>
        </div>
    </div>
</body>
</html>
